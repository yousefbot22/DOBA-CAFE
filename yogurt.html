<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DOBA CAFE | زبادي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #fefaf5; color: #2c2420; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(255, 251, 245, 0.95);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #f0e2d4;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #b87c4f, #e0a87c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo span { font-size: 32px; color: #b87c4f; background: none; }
        .nav-links { display: flex; gap: 30px; list-style: none; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 600; color: #3e2c21; transition: 0.3s; }
        .nav-links a:hover { color: #b87c4f; }
        .menu-icon { display: none; font-size: 28px; cursor: pointer; }
        .page-header {
            background: linear-gradient(135deg, #b87c4f, #e0a87c);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .page-header h1 { font-size: 38px; margin-bottom: 10px; }
        .menu-container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #f0e2d4;
            transition: 0.2s;
        }
        .menu-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #e0a87c;
        }
        .item-name { font-size: 18px; font-weight: 600; color: #2c1d12; }
        .item-price { font-size: 18px; font-weight: 800; color: #b87c4f; }
        .back-home {
            position: fixed; bottom: 25px; right: 25px;
            background: #b87c4f; color: white; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 22px;
            box-shadow: 0 5px 18px rgba(0,0,0,0.2);
            transition: 0.3s; text-decoration: none; z-index: 1000;
        }
        .back-home:hover { transform: scale(1.08); background: #9b623b; }
        footer {
            background: #1f160f; color: #e4cfbc; text-align: center;
            padding: 25px; margin-top: 40px;
        }
        @media (max-width: 768px) {
            .menu-icon { display: block; }
            .nav-links {
                position: fixed; top: 70px; right: -100%;
                flex-direction: column; background: white; width: 70%;
                height: 100vh; padding: 35px; transition: 0.3s;
                box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            }
            .nav-links.active { right: 0; }
            .item-name { font-size: 15px; }
            .item-price { font-size: 16px; }
            .menu-item { padding: 12px 18px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><span>☕</span> DOBA CAFE</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="soda.html">🥤 مشروبات غازية</a></li>
            <li><a href="yogurt.html">🥤 زبادي</a></li>
            <li><a href="additions.html">➕ إضافات</a></li>
            <li><a href="waffle.html">🧇 وافل</a></li>
            <li><a href="dessert.html">🍰 حلويات</a></li>
        </ul>
        <div class="menu-icon" id="menuIcon">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <div class="page-header">
        <h1>🥤 الزبادي</h1>
        <p>زبادي طبيعي ولذيذ</p>
    </div>

    <div class="menu-container">
        <div class="menu-item"><span class="item-name">زبادي كلاسيك</span><span class="item-price">60 جنيه</span></div>
        <div class="menu-item"><span class="item-name">زبادي فواكه</span><span class="item-price">75 جنيه</span></div>
        <div class="menu-item"><span class="item-name">زبادي أفوكادو</span><span class="item-price">100 جنيه</span></div>
        <div class="menu-item"><span class="item-name">زبادي زاهر</span><span class="item-price">120 جنيه</span></div>
    </div>

    <a href="index.html" class="back-home"><i class="fas fa-home"></i></a>

    <footer>
        <p>&copy; 2026 DOBA CAFE | دوبا كافيه</p>
    </footer>

    <script>
        const menuIcon = document.getElementById('menuIcon');
        const navLinks = document.getElementById('navLinks');
        if (menuIcon) {
            menuIcon.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
