<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dessert Menu</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f3d36;
  color:#fff;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:60px;
  margin:10px 0;
}

h2{
  background:#0b2c27;
  display:inline-block;
  padding:5px 15px;
  border-radius:10px;
  margin-top:20px;
}

.menu{
  display:flex;
  gap:40px;
}

.column{
  flex:1;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.item span{
  color:#ccc;
}

.price{
  color:#fff;
}

@media(max-width:768px){
  .menu{
    flex-direction:column;
  }

  h1{
    font-size:40px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>DESSERTS MENU</h1>

<div class="menu">

<!-- LEFT -->
<div class="column">

<h2>Soda</h2>
<div class="item"><span>Pepsi</span><span class="price">25</span></div>
<div class="item"><span>Cola</span><span class="price">25</span></div>
<div class="item"><span>Fayrouz</span><span class="price">35</span></div>

<h2>Yogurt</h2>
<div class="item"><span>Classic Yogurt</span><span class="price">60</span></div>
<div class="item"><span>Fruit Yogurt</span><span class="price">75</span></div>

<h2>Additions</h2>
<div class="item"><span>Sauce</span><span class="price">15</span></div>
<div class="item"><span>Nuts</span><span class="price">20</span></div>

</div>

<!-- RIGHT -->
<div class="column">

<h2>Waffle</h2>
<div class="item"><span>Nutella</span><span class="price">65</span></div>
<div class="item"><span>Lotus</span><span class="price">70</span></div>

<h2>Dessert</h2>
<div class="item"><span>Cheesecake</span><span class="price">80</span></div>
<div class="item"><span>Chocolate Cake</span><span class="price">85</span></div>
<div class="item"><span>Molten Cake</span><span class="price">95</span></div>

</div>

</div>

</div>

</body>
</html>
